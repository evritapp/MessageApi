  trigger: 
  - dev
  pool:
    vmImage: 'ubuntu-latest'

  steps: 
  - task: GoTool@0
    inputs:
      version: '1.23.1'
  - task: Go@0
    inputs:
      command: 'get'
      arguments: '-d'
      workingDirectory: '$(System.DefaultWorkingDirectory)'
  - task: Go@0
    enabled: false
    displayName: 'run test -v' 
    inputs:
      command: 'test'
      arguments: '-v ./...'
      workingDirectory: '$(System.DefaultWorkingDirectory)'
  - task: Go@0
    displayName: 'run build -tags dev' 
    inputs:
      command: 'build'

      arguments: ''
      workingDirectory: '$(System.DefaultWorkingDirectory)'
  - task: CopyFiles@2
    inputs:
      Contents: '**'
      TargetFolder: '$(Build.ArtifactStagingDirectory)'
  - task: PublishBuildArtifacts@1
    inputs:
      PathtoPublish: '$(Build.ArtifactStagingDirectory)'
      ArtifactName: 'dev'
